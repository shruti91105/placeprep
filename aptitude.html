<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes - PlacePrep</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background: linear-gradient(-45deg, #667eea, #764ba2, #00c6ff, #0072ff);
    background-size:400% 400%;
    animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Notes Container */
.notes-container{
    width:80%;
    text-align:center;
    color:white;
}

.notes-container h1{
    margin-bottom:30px;
}

/* Cards Layout */
.notes-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:25px;
}

/* Individual Card */
.note-card{
    position:relative;
    height:260px; /* increased height more */
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
.note-card img{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover; /* KEY LINE 🔥 */
    transition:0.5s;
}

.note-card:hover{
    transform: translateY(-10px) scale(1.03);
    background: rgba(255,255,255,0.2);
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* Title */
.note-content h2{
    font-size:24px;
    margin-bottom:10px;
    color:#fff;
    font-weight:bold;
    text-shadow: 0 3px 8px rgba(0,0,0,0.8); /* glow effect */
}


/* Small text */
.note-card p{
    font-size:14px;
    opacity:0.9;
}
.note-content p{
    font-size:15px;
    color:#f1f1f1;
    text-shadow: 0 2px 6px rgba(0,0,0,0.7);
}

/* Hover Effects */
.note-card:hover img{
    transform:scale(1.1);
}

.note-card:hover{
    transform:translateY(-8px);
}
.note-card::after{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: linear-gradient(
        to top,
        rgba(0,0,0,0.85),
        rgba(0,0,0,0.4),
        rgba(0,0,0,0.2)
    );
    z-index:1;
}
.note-content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    z-index:2;
    width:90%;
}
</style>
</head>

<body>
