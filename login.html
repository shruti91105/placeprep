<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PlacePrep</title>

<link rel="stylesheet" href="style.css">
</head>
<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background: linear-gradient(-45deg, #667eea, #764ba2, #00c6ff, #0072ff);
    background-size:400% 400%;
    animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
</style>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo">PlacePrep Pro</div>
    <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="aptitude.html">Notes</a></li>
        <li><a href="#">Quiz</a></li>
        <li><a href="register.html">Register</a></li>
    </ul>
</nav>

<!-- Animated Background -->
<div class="blob"></div>
<div class="blob"></div>
<div class="blob"></div>

<!-- Login Card -->
<div class="login-container">
    <h2>Login to PlacePrep Pro</h2>
 <BR>
    <BR>
    <div class="role-selector">
        <div class="role active" onclick="selectRole(this)">Student</div>
        <div class="role" onclick="selectRole(this)">Admin</div>
        <div class="role" onclick="selectRole(this)">Teacher</div>
    </div>

    <form>
        <div class="input-box">
            <input type="email" required>
            <label>Email</label>
        </div>

        <div class="input-box">
            <input type="password" required>
            <label>Password</label>
        </div>

        <button class="login-btn">Login</button>
    </form>

    <div class="extra">
        <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
