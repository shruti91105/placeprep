<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PlacePrep</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background: linear-gradient(-45deg, #667eea, #764ba2, #00c6ff, #0072ff);
    background-size:400% 400%;
    animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo">PlacePrep Pro</div>
    <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="aptitude.html">Notes</a></li>
        <li><a href="quiz-options.html">Quiz</a></li>
        <li><a href="register.html">Register</a></li>
    </ul>
</nav>

<!-- Login Card -->
<div class="login-container">
    <h2>Login to PlacePrep Pro</h2>
    <br>

    <div class="role-selector">
        <div class="role active" onclick="selectRole(this, 'student')">Student</div>
        <div class="role" onclick="selectRole(this, 'admin')">Admin</div>
        <div class="role" onclick="selectRole(this, 'teacher')">Teacher</div>
    </div>

    <form id="loginForm">
        <div class="input-box">
            <input type="email" id="email" required>
            <label>Email</label>
        </div>

        <div class="input-box">
            <input type="password" id="password" required>
            <label>Password</label>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="extra">
        <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>
</div>

<script>
let selectedRole = "student";

function selectRole(element, role) {
    document.querySelectorAll(".role").forEach(el => el.classList.remove("active"));
    element.classList.add("active");
    selectedRole = role;
}

document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    fetch("http://localhost:5000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email,
            password
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.message === "Login successful") {

            if (data.role !== selectedRole) {
                alert("Wrong role selected!");
                return;
            }

            localStorage.setItem("userEmail", data.email);
            localStorage.setItem("userName", data.name);

            if (data.role === "student") {
                window.location.href = "student-dashboard.html";
            }
            else if (data.role === "teacher") {
                window.location.href = "teacher-dashboard.html";
            }
            else {
                window.location.href = "admin-dashboard.html";
            }

        } else {
            alert(data);
            window.location.href = "register.html";
        }
    });
});

</script>

</body>
</html>
