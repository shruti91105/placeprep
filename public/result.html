<!DOCTYPE html>
<html>
<head>
<title>Result - PlacePrep Pro</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background: linear-gradient(-45deg, #667eea, #764ba2, #00c6ff, #0072ff);
}

.box{
    background: rgba(255,255,255,0.1);
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:white;
}

button{
    margin-top:20px;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Your Score</h2>
<h1 id="score"></h1>

<button onclick="goBack()">Back to Quiz Options</button>
</div>

<script>
document.getElementById("score").innerText =
    localStorage.getItem("score");

function goBack(){
    window.location.href = "quiz-options.html";
}
</script>

</body>
</html>
